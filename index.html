<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>잠 & 잔</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0F1115; }
  body { font-family: -apple-system, "SF Pro Text", "Pretendard", system-ui, sans-serif; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  .app-root {
    --bg: #0F1115; --surface: #161A22; --card: #1D222C; --border: #2A2F3A;
    --text: #ECEEF2; --muted: #8B92A3; --amber: #E2974B; --teal: #2FAE8E; --deep-teal: #0B5A45;
    background: var(--bg); color: var(--text);
    width: 100%; max-width: 480px; margin: 0 auto; min-height: 100dvh;
    display: flex; flex-direction: column; position: relative;
  }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
  .brand { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
  .save-toast { font-size: 11px; color: var(--amber); }

  .content { flex: 1; padding: 4px 16px 90px; overflow-y: auto; }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 6px 0 14px; }
  .month-label { font-size: 17px; font-weight: 700; min-width: 120px; text-align: center; }
  .icon-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); padding-bottom: 4px; }
  .weekday { text-align: center; font-size: 11px; color: var(--muted); }
  .weekday.sun { color: var(--amber); }

  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell { aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--text); position: relative; padding: 0; }
  .day-cell.blank { background: transparent; border: none; }
  .day-cell.today { border-color: var(--teal); box-shadow: 0 0 0 1px var(--teal) inset; }
  .day-num { font-size: 13px; font-weight: 600; }
  .day-marks { display: flex; flex-direction: column; align-items: center; gap: 2px; min-height: 22px; }
  .dot-drink { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: inline-block; }
  .day-soju { font-size: 9px; color: var(--amber); font-weight: 700; }
  .day-sleep { font-size: 9px; color: var(--muted); }
  .legend { margin-top: 14px; font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; align-items: center; gap: 6px; width: 100%; line-height: 1.5; }
  .legend .dot-drink { width: 7px; height: 7px; flex-shrink: 0; }

  .stats-view { padding-top: 8px; display: flex; flex-direction: column; align-items: center; }
  .streak-orb { width: 168px; height: 168px; border-radius: 50%; border: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.04), transparent 70%); margin: 8px 0 22px; }
  .streak-num { font-size: 44px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .streak-unit { font-size: 12px; color: var(--muted); margin-top: 6px; max-width: 110px; text-align: center; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; }
  .stat-label { font-size: 10.5px; color: var(--muted); line-height: 1.3; }
  .stat-value { font-size: 15px; font-weight: 700; }

  .insight { width: 100%; margin: 14px 0 4px; font-size: 12.5px; color: var(--muted); background: var(--surface); border-radius: 10px; padding: 10px 12px; line-height: 1.5; }
  .insight.warn { color: #F2B879; }

  .section-title { width: 100%; font-size: 12.5px; color: var(--muted); margin: 22px 0 10px; font-weight: 600; }
  .bar-chart { width: 100%; display: flex; gap: 4px; align-items: flex-end; height: 120px; background: var(--surface); border-radius: 14px; padding: 10px 8px 6px; border: 1px solid var(--border); }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 4px; }
  .bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar-fill { width: 100%; border-radius: 4px 4px 0 0; background: var(--teal); min-height: 4px; }
  .bar-fill.drink { background: var(--amber); }
  .bar-fill.empty { background: var(--border); }
  .bar-day { font-size: 8.5px; color: var(--muted); }

  .settings-view { padding-top: 10px; }
  .settings-desc { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .field-block { margin-bottom: 20px; }
  .money-input-row { display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 4px 12px; margin-top: 6px; }
  .won { color: var(--muted); font-size: 15px; }
  .money-input { flex: 1; background: none; border: none; color: var(--text); font-size: 17px; font-weight: 700; padding: 10px 0; outline: none; }
  .savings-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .savings-card.highlight { border-color: var(--teal); background: rgba(47,174,142,0.08); }
  .savings-label { font-size: 11px; color: var(--muted); }
  .savings-amount { font-size: 20px; font-weight: 800; }
  .savings-amount.big { font-size: 26px; color: var(--teal); }
  .savings-sub { font-size: 11px; color: var(--muted); }
  .settings-note { font-size: 10.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); }
  .tab { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; padding: 4px 0; }
  .tab.active { color: var(--teal); }
  .tab .tab-icon { font-size: 18px; line-height: 1; }

  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 20px 20px 0 0; padding: 8px 18px calc(20px + env(safe-area-inset-bottom)); max-height: 88dvh; overflow-y: auto; }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 6px auto 10px; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sheet-title { font-size: 16px; font-weight: 700; }

  .drink-toggle { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .drink-toggle.on { background: rgba(226,151,75,0.14); border-color: var(--amber); color: var(--amber); }

  .drink-detail { margin-bottom: 14px; }
  .drink-list { margin-bottom: 10px; }
  .drink-row { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 10px; margin-bottom: 6px; }
  .drink-row-main { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .drink-row-label { font-size: 12.5px; font-weight: 600; }
  .drink-row-eq { font-size: 11px; color: var(--amber); }
  .drink-row-remove { background: none; border: none; color: var(--muted); display: flex; font-size: 14px; }
  .drink-total { font-size: 12px; color: var(--amber); font-weight: 600; padding: 4px 2px; }

  .field-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .type-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chip { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 6px 13px; font-size: 12.5px; }
  .chip.on { background: rgba(47,174,142,0.14); border-color: var(--teal); color: var(--teal); font-weight: 700; }
  .preset-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .preset { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px 0; font-size: 12.5px; }
  .preset.on { border-color: var(--amber); color: var(--amber); font-weight: 700; }
  .manual-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 14px; }
  .manual-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .text-input.small { padding: 8px 10px; font-size: 13px; }
  .add-drink-btn { background: var(--teal); color: #08231C; border: none; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }

  .text-input, .memo-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 13px; margin-top: 2px; outline: none; }
  .memo-input { margin: 10px 0 14px; resize: none; font-family: inherit; }

  .time-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .time-field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .time-input { background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 9px 10px; font-size: 14px; font-variant-numeric: tabular-nums; outline: none; }
  .sleep-preview { font-size: 11.5px; color: var(--teal); margin-bottom: 10px; min-height: 14px; }

  .sheet-actions { display: flex; gap: 10px; margin-top: 6px; }
  .delete-btn, .save-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; }
  .delete-btn { background: rgba(226,151,75,0.12); color: var(--amber); }
  .save-btn { background: var(--teal); color: #08231C; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

// ---------- Supabase 연결 ----------
var SUPABASE_URL = "https://hgwvpbzrwfkehepassut.supabase.co";
var SUPABASE_KEY = "sb_publishable_vPAn-WpGRutXeQ16U0mnbQ_FKkw-tXZ";
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- localStorage (오프라인 캐시 — 인터넷 끊겼을 때 마지막 저장본 보여주는 용도) ----------
var REC_KEY = "sd_records_v1";
var SET_KEY = "sd_settings_v1";

function loadLocalRecords() {
  try { return JSON.parse(localStorage.getItem(REC_KEY) || "{}"); }
  catch (e) { return {}; }
}
function loadLocalSettings() {
  try { return Object.assign({ dailyReward: 10000 }, JSON.parse(localStorage.getItem(SET_KEY) || "{}")); }
  catch (e) { return { dailyReward: 10000 }; }
}
function cacheLocally() {
  try {
    localStorage.setItem(REC_KEY, JSON.stringify(state.records));
    localStorage.setItem(SET_KEY, JSON.stringify(state.settings));
  } catch (e) {}
}

// ---------- Supabase 읽기/쓰기 ----------
async function dbLoadAll() {
  try {
    var res = await supabase.from("drink_records").select("date, data");
    if (res.error) throw res.error;
    return res.data;
  } catch (e) { console.error(e); return null; }
}
async function dbUpsert(dateKey, dataObj) {
  try {
    var sel = await supabase.from("drink_records").select("id").eq("date", dateKey).limit(1);
    if (sel.error) throw sel.error;
    if (sel.data && sel.data.length) {
      var upd = await supabase.from("drink_records").update({ data: dataObj }).eq("id", sel.data[0].id);
      if (upd.error) throw upd.error;
    } else {
      var ins = await supabase.from("drink_records").insert({ date: dateKey, data: dataObj });
      if (ins.error) throw ins.error;
    }
    return true;
  } catch (e) { console.error(e); return false; }
}
async function dbDelete(dateKey) {
  try {
    var res = await supabase.from("drink_records").delete().eq("date", dateKey);
    if (res.error) throw res.error;
    return true;
  } catch (e) { console.error(e); return false; }
}

// ---------- date helpers ----------
function fmt(d) {
  var y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}
function lastNDays(n) {
  var arr = [], today = new Date();
  for (var i = n - 1; i >= 0; i--) {
    var d = new Date(today); d.setDate(d.getDate() - i); arr.push(fmt(d));
  }
  return arr;
}
function sleepMinutes(entry) {
  if (!entry || !entry.sleepTime || !entry.wakeTime) return null;
  var s = entry.sleepTime.split(":").map(Number), w = entry.wakeTime.split(":").map(Number);
  var start = s[0] * 60 + s[1], end = w[0] * 60 + w[1], dur = end - start;
  if (dur <= 0) dur += 1440;
  return dur;
}
function minutesToHourLabel(min) {
  if (min == null) return "—";
  var h = Math.floor(min / 60), m = min % 60;
  return m === 0 ? h + "시간" : h + "시간 " + m + "분";
}
var WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];

// ---------- alcohol conversion ----------
var DRINK_TYPES = [
  { key: "soju", label: "소주", abv: 16.5, presets: [{ label: "1잔", ml: 50 }, { label: "반병", ml: 180 }, { label: "1병", ml: 360 }] },
  { key: "beer", label: "맥주", abv: 4.5, presets: [{ label: "1캔", ml: 355 }, { label: "1병", ml: 500 }, { label: "1000cc", ml: 1000 }] },
  { key: "makgeolli", label: "막걸리", abv: 6, presets: [{ label: "1잔", ml: 150 }, { label: "반통", ml: 375 }, { label: "1통", ml: 750 }] },
  { key: "wine", label: "와인", abv: 13, presets: [{ label: "1잔", ml: 150 }, { label: "반병", ml: 375 }, { label: "1병", ml: 750 }] },
  { key: "whiskey", label: "위스키", abv: 40, presets: [{ label: "1샷", ml: 30 }, { label: "2샷", ml: 60 }, { label: "더블", ml: 45 }] },
  { key: "highball", label: "하이볼", abv: 7, presets: [{ label: "1잔", ml: 250 }, { label: "2잔", ml: 500 }] },
  { key: "other", label: "기타", abv: 15, presets: [] }
];
var SOJU_BOTTLE_GRAMS = 360 * (16.5 / 100) * 0.8;
var SOJU_GLASS_GRAMS = 50 * (16.5 / 100) * 0.8;

function entryGrams(d) { return (d.ml || 0) * ((d.abv || 0) / 100) * 0.8; }
function totalGrams(drinks) { return (drinks || []).reduce(function (s, d) { return s + entryGrams(d); }, 0); }
function sojuEquivalent(grams) { return grams / SOJU_BOTTLE_GRAMS; }
function sojuLabel(grams) { var eq = sojuEquivalent(grams); return eq > 0 ? "소주 " + eq.toFixed(1) + "병" : null; }
function sojuGlassLabel(grams) { var eq = grams / SOJU_GLASS_GRAMS; return eq > 0 ? "소주 " + eq.toFixed(1) + "잔" : null; }

function emptyDraft() { return { drank: false, drinks: [], sleepTime: "", wakeTime: "", memo: "" }; }

function streakStyle(days) {
  if (days === null) return { ring: "#3A4150", glow: "rgba(58,65,80,0)", label: "#8B92A3" };
  if (days === 0) return { ring: "#E2974B", glow: "rgba(226,151,75,0.45)", label: "#F2B879" };
  if (days < 3) return { ring: "#D9A356", glow: "rgba(217,163,86,0.4)", label: "#E6BD83" };
  if (days < 7) return { ring: "#B7AD5E", glow: "rgba(183,173,94,0.4)", label: "#CFC788" };
  if (days < 14) return { ring: "#5FB89A", glow: "rgba(95,184,154,0.45)", label: "#8FD4BC" };
  return { ring: "#2FAE8E", glow: "rgba(47,174,142,0.55)", label: "#6FE0BE" };
}

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

// ---------- global state ----------
var state = {
  records: {},
  settings: { dailyReward: 10000 },
  view: "calendar",
  currentMonth: new Date(),
  modalDate: null,
  draft: null,
  pickType: "soju",
  pickMl: 50,
  pickAbv: 16.5,
  pickPresetLabel: "1잔",
  toast: null
};
var pendingRetry = null;

function showToast(msg, retryFn) {
  state.toast = msg;
  pendingRetry = retryFn || null;
  renderHeader();
  if (!retryFn) {
    setTimeout(function () {
      if (state.toast === msg) { state.toast = null; renderHeader(); }
    }, 1600);
  }
}
function retryNow() {
  if (pendingRetry) { var fn = pendingRetry; pendingRetry = null; fn(); }
}

// ---------- persistence actions ----------
function persistRecord(dateKey) {
  cacheLocally();
  dbUpsert(dateKey, state.records[dateKey]).then(function (ok) {
    showToast(ok ? "저장됨" : "저장 실패 · 탭해서 재시도", ok ? null : function () { persistRecord(dateKey); });
  });
}
function persistDeleteDate(dateKey) {
  cacheLocally();
  dbDelete(dateKey).then(function (ok) {
    showToast(ok ? "삭제됨" : "삭제 실패 · 탭해서 재시도", ok ? null : function () { persistDeleteDate(dateKey); });
  });
}
function persistSettings() {
  cacheLocally();
  dbUpsert("__settings__", state.settings).then(function (ok) {
    showToast(ok ? "저장됨" : "저장 실패 · 탭해서 재시도", ok ? null : function () { persistSettings(); });
  });
}

// ---------- 초기 로딩 ----------
async function initApp() {
  document.getElementById("app").innerHTML =
    '<div class="app-root"><div style="padding:80px 20px;text-align:center;color:#8B92A3">불러오는 중…</div></div>';
  var rows = await dbLoadAll();
  if (rows) {
    var recs = {}, settings = { dailyReward: 10000 };
    rows.forEach(function (row) {
      if (row.date === "__settings__") settings = Object.assign(settings, row.data || {});
      else recs[row.date] = row.data;
    });
    state.records = recs;
    state.settings = settings;
    cacheLocally();
    renderAll();
  } else {
    state.records = loadLocalRecords();
    state.settings = loadLocalSettings();
    renderAll();
    showToast("오프라인 · 마지막 저장본 표시 중");
  }
}

// ---------- day modal actions ----------
function openDay(ds) {
  state.modalDate = ds;
  state.draft = state.records[ds] ? JSON.parse(JSON.stringify(state.records[ds])) : emptyDraft();
  state.pickType = "soju"; state.pickMl = 50; state.pickAbv = 16.5; state.pickPresetLabel = "1잔";
  renderAll();
}
function closeModal() {
  state.modalDate = null; state.draft = null;
  renderAll();
}
function saveDraft() {
  var ds = state.modalDate;
  state.records[ds] = state.draft;
  closeModal();
  persistRecord(ds);
}
function deleteDay() {
  var ds = state.modalDate;
  delete state.records[ds];
  closeModal();
  persistDeleteDate(ds);
}
function toggleDrank() {
  state.draft.drank = !state.draft.drank;
  renderModal();
}
function changeType(key) {
  var conf = DRINK_TYPES.filter(function (t) { return t.key === key; })[0];
  state.pickType = key;
  state.pickAbv = conf.abv;
  state.pickMl = (conf.presets[0] && conf.presets[0].ml) || 30;
  state.pickPresetLabel = (conf.presets[0] && conf.presets[0].label) || null;
  renderModal();
}
function choosePreset(ml, label) {
  state.pickMl = ml; state.pickPresetLabel = label;
  renderModal();
}
function onManualMlInput(v) {
  state.pickMl = Number(v) || 0;
  state.pickPresetLabel = null;
  // 직접 입력 시엔 프리셋 하이라이트만 갱신 (전체 리렌더 없이 포커스 유지)
  document.querySelectorAll(".preset").forEach(function (el) { el.classList.remove("on"); });
}
function onManualAbvInput(v) {
  state.pickAbv = Number(v) || 0;
}
function addDrink() {
  var conf = DRINK_TYPES.filter(function (t) { return t.key === state.pickType; })[0];
  state.draft.drank = true;
  state.draft.drinks.push({
    key: state.pickType,
    label: conf.label,
    displayAmount: state.pickPresetLabel || (state.pickMl + "ml"),
    ml: state.pickMl,
    abv: state.pickType === "other" ? state.pickAbv : conf.abv
  });
  renderModal();
}
function removeDrink(idx) {
  state.draft.drinks.splice(idx, 1);
  renderModal();
}
function onSleepTimeInput(v) {
  state.draft.sleepTime = v;
  updateSleepPreview();
}
function onWakeTimeInput(v) {
  state.draft.wakeTime = v;
  updateSleepPreview();
}
function updateSleepPreview() {
  var el = document.getElementById("sleepPreview");
  if (!el) return;
  var min = sleepMinutes(state.draft);
  el.textContent = min != null ? "수면시간: " + minutesToHourLabel(min) : "";
}
function onMemoInput(v) { state.draft.memo = v; }

function setView(v) { state.view = v; renderAll(); }
function navMonth(delta) {
  state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() + delta, 1);
  renderAll();
}

// ---------- settings actions ----------
function commitReward(v) {
  var n = Number(v) || 0;
  state.settings.dailyReward = n;
  persistSettings();
  renderAll();
}

// ============ RENDER ============
function renderHeader() {
  var el = document.getElementById("topbar");
  if (!el) return;
  el.innerHTML =
    '<span class="brand">\uD83C\uDF19 잠 &amp; 잔</span>' +
    (state.toast
      ? '<span class="save-toast"' + (pendingRetry ? ' onclick="retryNow()" style="text-decoration:underline;cursor:pointer"' : '') + '>' + esc(state.toast) + '</span>'
      : '<span></span>');
}

function computeStreak() {
  var drinkDates = Object.keys(state.records).filter(function (d) { return state.records[d].drank; }).sort();
  if (!drinkDates.length) return null;
  var last = drinkDates[drinkDates.length - 1];
  var lastDate = new Date(last + "T00:00:00");
  var todayDate = new Date(fmt(new Date()) + "T00:00:00");
  return Math.round((todayDate - lastDate) / 86400000);
}

function computeStats() {
  var days30 = lastNDays(30);
  var entries30 = days30.map(function (ds) { return state.records[ds]; }).filter(Boolean);
  var drinkDaysCount = entries30.filter(function (e) { return e.drank; }).length;
  var grams30 = entries30.reduce(function (s, e) { return s + totalGrams(e.drinks); }, 0);
  var withSleep = days30.map(function (ds) { return state.records[ds]; }).filter(function (e) { return e && sleepMinutes(e) != null; });
  var drankSleep = withSleep.filter(function (e) { return e.drank; }).map(sleepMinutes);
  var soberSleep = withSleep.filter(function (e) { return !e.drank; }).map(sleepMinutes);
  function avg(arr) { return arr.length ? Math.round(arr.reduce(function (a, b) { return a + b; }, 0) / arr.length) : null; }
  return { drinkDaysCount: drinkDaysCount, grams30: grams30, avgDrankSleep: avg(drankSleep), avgSoberSleep: avg(soberSleep) };
}

function computeSavings() {
  var entries = Object.keys(state.records).map(function (k) { return [k, state.records[k]]; });
  var soberAll = entries.filter(function (e) { return e[1].drank === false; }).length;
  var today = fmt(new Date()), ym = today.slice(0, 7);
  var soberMonth = entries.filter(function (e) { return e[1].drank === false && e[0].slice(0, 7) === ym; }).length;
  var reward = state.settings.dailyReward || 0;
  return { soberAll: soberAll, soberMonth: soberMonth, totalAmount: soberAll * reward, monthAmount: soberMonth * reward };
}

function buildCalendarHTML() {
  var year = state.currentMonth.getFullYear(), month = state.currentMonth.getMonth();
  var firstDay = new Date(year, month, 1), startOffset = firstDay.getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var today = fmt(new Date());

  var cells = "";
  for (var i = 0; i < startOffset; i++) cells += '<div class="day-cell blank"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var dateObj = new Date(year, month, d);
    var ds = fmt(dateObj);
    var entry = state.records[ds];
    var isToday = ds === today;
    var minutes = sleepMinutes(entry);
    var grams = entry ? totalGrams(entry.drinks) : 0;
    var marks = "";
    if (entry && entry.drank) {
      if (grams > 0) marks += '<span class="day-soju">' + sojuEquivalent(grams).toFixed(1) + '병</span>';
      else marks += '<span class="dot-drink"></span>';
    }
    if (minutes != null) marks += '<span class="day-sleep">' + (minutes / 60).toFixed(1) + 'h</span>';
    cells +=
      '<button class="day-cell' + (isToday ? " today" : "") + '" onclick="openDay(\'' + ds + '\')">' +
      '<span class="day-num">' + d + '</span>' +
      '<span class="day-marks">' + marks + '</span>' +
      '</button>';
  }

  return (
    '<div class="month-nav">' +
    '<button class="icon-btn" onclick="navMonth(-1)">‹</button>' +
    '<span class="month-label">' + year + '년 ' + (month + 1) + '월</span>' +
    '<button class="icon-btn" onclick="navMonth(1)">›</button>' +
    '</div>' +
    '<div class="weekday-row">' +
    WEEKDAYS.map(function (w, i) { return '<span class="weekday' + (i === 0 ? " sun" : "") + '">' + w + '</span>'; }).join("") +
    '</div>' +
    '<div class="day-grid">' + cells + '</div>' +
    '<p class="legend"><span class="dot-drink"></span><span>음주일 · 숫자는 소주 환산 병수 / 수면시간</span></p>'
  );
}

function buildStatsHTML() {
  var streak = computeStreak();
  var sc = streakStyle(streak);
  var stats = computeStats();
  var delta = (stats.avgDrankSleep != null && stats.avgSoberSleep != null) ? (stats.avgSoberSleep - stats.avgDrankSleep) : null;

  var insightHtml = "";
  if (delta != null) {
    var cls = delta > 0 ? " warn" : "";
    var msg = delta > 0
      ? "술을 마신 날은 평균적으로 " + minutesToHourLabel(Math.abs(delta)) + " 더 적게 잤어요."
      : (delta < 0 ? "이번 30일은 음주일 수면시간이 오히려 더 길었어요." : "음주 여부와 수면시간 차이가 거의 없어요.");
    insightHtml = '<p class="insight' + cls + '">' + msg + '</p>';
  }

  var last14 = lastNDays(14).map(function (ds) {
    var entry = state.records[ds];
    return { ds: ds, entry: entry, minutes: sleepMinutes(entry) };
  });
  var barsHtml = last14.map(function (item) {
    var height = item.minutes != null ? Math.min(100, (item.minutes / 600) * 100) : 4;
    var cls = "bar-fill" + (item.entry && item.entry.drank ? " drink" : "") + (item.minutes == null ? " empty" : "");
    var day = Number(item.ds.slice(8, 10));
    return (
      '<div class="bar-col"><div class="bar-track"><div class="' + cls + '" style="height:' + height + '%"></div></div>' +
      '<span class="bar-day">' + day + '</span></div>'
    );
  }).join("");

  return (
    '<div class="streak-orb" style="box-shadow:0 0 36px ' + sc.glow + ';border-color:' + sc.ring + '">' +
    '<span class="streak-num" style="color:' + sc.label + '">' + (streak === null ? "—" : streak) + '</span>' +
    '<span class="streak-unit">' + (streak === null ? "기록을 시작해보세요" : "일째 안 마심") + '</span>' +
    '</div>' +
    '<div class="card-grid">' +
    '<div class="stat-card"><span class="stat-label">최근 30일 음주일</span><span class="stat-value">' + stats.drinkDaysCount + '일</span></div>' +
    '<div class="stat-card"><span class="stat-label">최근 30일 음주량</span><span class="stat-value">' + (sojuLabel(stats.grams30) || "0병") + '</span></div>' +
    '<div class="stat-card"><span class="stat-label">음주일 평균 수면</span><span class="stat-value">' + (stats.avgDrankSleep != null ? minutesToHourLabel(stats.avgDrankSleep) : "기록 없음") + '</span></div>' +
    '<div class="stat-card"><span class="stat-label">비음주일 평균 수면</span><span class="stat-value">' + (stats.avgSoberSleep != null ? minutesToHourLabel(stats.avgSoberSleep) : "기록 없음") + '</span></div>' +
    '</div>' +
    insightHtml +
    '<h3 class="section-title">최근 14일 수면시간</h3>' +
    '<div class="bar-chart">' + barsHtml + '</div>'
  );
}

function buildSettingsHTML() {
  var savings = computeSavings();
  return (
    '<h3 class="section-title" style="margin-top:6px">금주 적립</h3>' +
    '<p class="settings-desc">술을 안 마신 날을 기록하면 하루치 보상 금액이 자동으로 쌓여요.</p>' +
    '<div class="field-block">' +
    '<span class="field-label">하루 절약 금액</span>' +
    '<div class="money-input-row"><span class="won">₩</span>' +
    '<input type="number" inputmode="numeric" class="money-input" value="' + state.settings.dailyReward + '" ' +
    'onblur="commitReward(this.value)" /></div>' +
    '</div>' +
    '<div class="savings-card"><span class="savings-label">이번 달 적립액</span>' +
    '<span class="savings-amount">₩' + savings.monthAmount.toLocaleString("ko-KR") + '</span>' +
    '<span class="savings-sub">안 마신 날 ' + savings.soberMonth + '일</span></div>' +
    '<div class="savings-card highlight"><span class="savings-label">전체 적립액</span>' +
    '<span class="savings-amount big">₩' + savings.totalAmount.toLocaleString("ko-KR") + '</span>' +
    '<span class="savings-sub">안 마신 날 ' + savings.soberAll + '일</span></div>' +
    '<p class="settings-note">* 캘린더에서 날짜를 열고 "오늘 안 마심"으로 저장해야 적립일로 계산돼요.</p>'
  );
}

function buildModalHTML() {
  if (!state.modalDate) return "";
  var d = new Date(state.modalDate + "T00:00:00");
  var label = (d.getMonth() + 1) + "월 " + d.getDate() + "일 (" + WEEKDAYS[d.getDay()] + ")";
  var draft = state.draft;
  var hasExisting = !!state.records[state.modalDate];
  var minutes = sleepMinutes(draft);
  var typeConf = DRINK_TYPES.filter(function (t) { return t.key === state.pickType; })[0];

  var drinkListHtml = "";
  if (draft.drank && draft.drinks.length > 0) {
    var rows = draft.drinks.map(function (dr, idx) {
      return (
        '<div class="drink-row"><div class="drink-row-main">' +
        '<span class="drink-row-label">' + esc(dr.label) + ' ' + esc(dr.displayAmount || (dr.ml + "ml")) + '</span>' +
        '<span class="drink-row-eq">≈ ' + (sojuGlassLabel(entryGrams(dr)) || "소주 0잔") + '</span>' +
        '</div><button class="drink-row-remove" onclick="removeDrink(' + idx + ')">✕</button></div>'
      );
    }).join("");
    var grams = totalGrams(draft.drinks);
    drinkListHtml =
      '<div class="drink-list">' + rows +
      '<div class="drink-total">총 알코올 약 ' + Math.round(grams) + 'g · ' + (sojuLabel(grams) || "소주 0병") + ' 상당</div></div>';
  }

  var drinkDetailHtml = "";
  if (draft.drank) {
    var chipsHtml = DRINK_TYPES.map(function (t) {
      return '<button class="chip' + (state.pickType === t.key ? " on" : "") + '" onclick="changeType(\'' + t.key + '\')">' + t.label + '</button>';
    }).join("");

    var presetHtml = "";
    if (typeConf.presets.length > 0) {
      presetHtml = '<div class="preset-row">' + typeConf.presets.map(function (p) {
        var on = (state.pickMl === p.ml && state.pickPresetLabel === p.label) ? " on" : "";
        return '<button class="preset' + on + '" onclick="choosePreset(' + p.ml + ',\'' + p.label + '\')">' + p.label + '</button>';
      }).join("") + '</div>';
    }

    var abvFieldHtml = "";
    if (state.pickType === "other") {
      abvFieldHtml =
        '<div class="manual-field"><span class="field-label">도수(%)</span>' +
        '<input type="number" class="text-input small" value="' + state.pickAbv + '" oninput="onManualAbvInput(this.value)" /></div>';
    }

    drinkDetailHtml =
      '<div class="drink-detail">' + drinkListHtml +
      '<div class="type-chips">' + chipsHtml + '</div>' +
      presetHtml +
      '<div class="manual-row">' +
      '<div class="manual-field"><span class="field-label">용량(ml) — 직접 입력 가능</span>' +
      '<input type="number" class="text-input small" value="' + state.pickMl + '" oninput="onManualMlInput(this.value)" /></div>' +
      abvFieldHtml +
      '<button class="add-drink-btn" onclick="addDrink()">+</button>' +
      '</div></div>';
  }

  return (
    '<div class="sheet-overlay" onclick="if(event.target===this) closeModal()">' +
    '<div class="sheet">' +
    '<div class="sheet-handle"></div>' +
    '<div class="sheet-header"><span class="sheet-title">' + label + '</span>' +
    '<button class="icon-btn" onclick="closeModal()">✕</button></div>' +
    '<div class="sheet-body">' +
    '<button class="drink-toggle' + (draft.drank ? " on" : "") + '" onclick="toggleDrank()">🍷 ' + (draft.drank ? "오늘 술 마심" : "오늘 안 마심") + '</button>' +
    drinkDetailHtml +
    '<div class="time-row">' +
    '<div class="time-field"><span class="field-label">🌙 취침</span>' +
    '<input type="time" class="time-input" value="' + esc(draft.sleepTime) + '" oninput="onSleepTimeInput(this.value)" /></div>' +
    '<div class="time-field"><span class="field-label">🌅 기상</span>' +
    '<input type="time" class="time-input" value="' + esc(draft.wakeTime) + '" oninput="onWakeTimeInput(this.value)" /></div>' +
    '</div>' +
    '<p class="sleep-preview" id="sleepPreview">' + (minutes != null ? "수면시간: " + minutesToHourLabel(minutes) : "") + '</p>' +
    '<textarea class="memo-input" placeholder="메모 (선택)" rows="2" oninput="onMemoInput(this.value)">' + esc(draft.memo) + '</textarea>' +
    '<div class="sheet-actions">' +
    (hasExisting ? '<button class="delete-btn" onclick="deleteDay()">🗑 삭제</button>' : "") +
    '<button class="save-btn" onclick="saveDraft()">✓ 저장</button>' +
    '</div></div></div></div>'
  );
}

function renderModal() {
  var holder = document.getElementById("modal-holder");
  if (!holder) return;
  holder.innerHTML = buildModalHTML();
}

function renderAll() {
  var app = document.getElementById("app");
  var contentHtml = "";
  if (state.view === "calendar") contentHtml = buildCalendarHTML();
  else if (state.view === "stats") contentHtml = buildStatsHTML();
  else if (state.view === "settings") contentHtml = buildSettingsHTML();

  app.innerHTML =
    '<div class="app-root">' +
    '<header class="topbar" id="topbar"></header>' +
    '<main class="content">' + contentHtml + '</main>' +
    '<nav class="tabbar">' +
    '<button class="tab' + (state.view === "calendar" ? " active" : "") + '" onclick="setView(\'calendar\')"><span class="tab-icon">📅</span><span>캘린더</span></button>' +
    '<button class="tab' + (state.view === "stats" ? " active" : "") + '" onclick="setView(\'stats\')"><span class="tab-icon">📊</span><span>통계</span></button>' +
    '<button class="tab' + (state.view === "settings" ? " active" : "") + '" onclick="setView(\'settings\')"><span class="tab-icon">⚙️</span><span>설정</span></button>' +
    '</nav>' +
    '<div id="modal-holder"></div>' +
    '</div>';

  renderHeader();
  renderModal();
}

initApp();
</script>
</body>
</html>
